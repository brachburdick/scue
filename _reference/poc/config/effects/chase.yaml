# Chase effect — sequential activation across fixture positions.
# Good for arps and directional sweeps.
effect:
  name: "chase"
  description: "Brightness peak that moves across fixture positions"
  parameters:
    speed:
      type: float
      min: 0.1
      max: 30.0
      default: 2.0
      unit: "hz"
    width:
      type: float
      min: 0.05
      max: 1.0
      default: 0.25
      description: "Fraction of the position range that is lit at any moment"
    direction:
      type: enum
      values: [forward, reverse, bounce]
      default: forward
    color:
      type: color
      default: [1.0, 0.0, 0.0]
    intensity:
      type: float
      min: 0.0
      max: 1.0
      default: 1.0
  output_channels: [brightness, color_r, color_g, color_b, position_x]
  one_shot: false   # runs continuously until released
