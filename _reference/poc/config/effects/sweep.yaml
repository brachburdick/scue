# Sweep effect — smooth movement across position axis. Good for risers/fallers.
effect:
  name: "sweep"
  description: "Smooth directional sweep across fixture positions"
  parameters:
    direction:
      type: enum
      values: [forward, reverse]
      default: forward
    speed:
      type: float
      min: 0.05
      max: 10.0
      default: 1.0
      unit: "cycles/second"
    width:
      type: float
      min: 0.1
      max: 1.0
      default: 0.4
    color:
      type: color
      default: [1.0, 1.0, 1.0]
    intensity:
      type: float
      min: 0.0
      max: 1.0
      default: 1.0
  output_channels: [brightness, color_r, color_g, color_b, position_x]
  one_shot: false
