# Breathe effect — slow sinusoidal brightness oscillation. Good for breakdowns/verses.
effect:
  name: "breathe"
  description: "Slow sinusoidal brightness oscillation"
  parameters:
    speed:
      type: float
      min: 0.02
      max: 5.0
      default: 0.25
      unit: "hz"
    intensity:
      type: float
      min: 0.0
      max: 1.0
      default: 0.7
    min_brightness:
      type: float
      min: 0.0
      max: 1.0
      default: 0.05
    color:
      type: color
      default: [0.5, 0.5, 1.0]
  output_channels: [brightness, color_r, color_g, color_b]
  one_shot: false
