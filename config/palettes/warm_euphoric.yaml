# Warm Euphoric palette — bright, warm, high-energy. Good for peak-hour drops.
palette:
  name: "warm_euphoric"
  description: "Bright warm tones — reds, oranges, yellows. High energy."
  primary:   [1.0, 0.3, 0.0]    # orange-red (RGB, 0.0–1.0)
  secondary: [1.0, 0.8, 0.0]    # warm yellow
  accent:    [1.0, 0.0, 0.0]    # pure red — for the hottest moments
  base_brightness: 0.9
  base_speed_multiplier: 1.2
  strobe_allowed: true
