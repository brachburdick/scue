# Dark Minimal palette — cool, restrained. Good for dark techno and minimal sets.
palette:
  name: "dark_minimal"
  description: "Cool tones, low brightness. Blue-whites and deep purples."
  primary:   [0.2, 0.2, 1.0]    # deep blue (RGB, 0.0–1.0)
  secondary: [0.4, 0.0, 0.6]    # dark purple
  accent:    [0.8, 0.8, 1.0]    # cold white-blue — for accents only
  base_brightness: 0.4
  base_speed_multiplier: 0.7
  strobe_allowed: false
