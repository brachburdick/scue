bridge:
  health:
    check_interval_s: 10.0
  network_interface: en16
  player_number: 5
  port: 17400
  restart:
    base_delay_s: 2.0
    max_crash_before_fallback: 3
    max_delay_s: 30.0
  route:
    auto_fix: true
    launchd_installed: false
  watchdog:
    is_receiving_threshold_ms: 5000
    poll_interval_s: 2.0
